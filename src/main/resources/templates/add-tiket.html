<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Tiket Baru</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; min-height: 100vh; }
        .navbar-brand { font-weight: 700; font-size: 1.3rem; }
        .page-header { background: linear-gradient(135deg, #1a56db 0%, #1e3a8a 100%); color: white; padding: 2.5rem 0 3.5rem; margin-bottom: -2rem; }
        .page-header h1 { font-weight: 700; font-size: 1.8rem; letter-spacing: -0.5px; }
        .card { border: none; border-radius: 16px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); }
        .form-label { font-weight: 600; font-size: 0.9rem; color: #374151; margin-bottom: 0.4rem; }
        .form-control { border-radius: 10px; border: 1.5px solid #e2e8f0; padding: 0.65rem 1rem; font-size: 0.95rem; transition: all 0.2s; }
        .form-control:focus { border-color: #1a56db; box-shadow: 0 0 0 3px rgba(26,86,219,0.15); }
        .form-control.is-invalid { border-color: #e11d48; }
        .invalid-feedback { font-size: 0.82rem; color: #e11d48; }
        .input-group-text { background: #f8fafc; border: 1.5px solid #e2e8f0; border-right: none; border-radius: 10px 0 0 10px; color: #64748b; font-weight: 600; }
        .input-group .form-control { border-left: none; border-radius: 0 10px 10px 0; }
        .btn-simpan { background: linear-gradient(135deg, #1a56db, #1e3a8a); color: white; border: none; border-radius: 10px; padding: 0.7rem 2rem; font-weight: 600; font-size: 0.95rem; transition: all 0.2s; }
        .btn-simpan:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(26,86,219,0.3); color: white; }
        .btn-batal { background: #f1f5f9; color: #64748b; border: none; border-radius: 10px; padding: 0.7rem 1.5rem; font-weight: 600; font-size: 0.95rem; transition: all 0.15s; }
        .btn-batal:hover { background: #e2e8f0; color: #374151; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark" style="background: #1e3a8a;">
    <div class="container">
        <a class="navbar-brand" href="/tiket"><i class="bi bi-ticket-perforated-fill me-2"></i>TiketApp</a>
    </div>
</nav>

<div class="page-header">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-2" style="opacity:0.7; font-size:0.85rem;">
                <li class="breadcrumb-item"><a href="/tiket" style="color:rgba(255,255,255,0.8); text-decoration:none;">Daftar Tiket</a></li>
                <li class="breadcrumb-item active" style="color:white;">Tambah Tiket</li>
            </ol>
        </nav>
        <h1><i class="bi bi-plus-circle me-2"></i>Tambah Tiket Baru</h1>
    </div>
</div>

<div class="container mb-5" style="margin-top: 2.5rem;">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="card">
                <div class="card-body p-4">
                    <form th:action="@{/tiket/add}" th:object="${tiket}" method="post" novalidate id="tiketForm">

                        <div class="mb-4">
                            <label for="nama" class="form-label">
                                <i class="bi bi-tag me-1 text-primary"></i>Nama Tiket
                            </label>
                            <input type="text" class="form-control" id="nama"
                                   th:field="*{nama}"
                                   th:classappend="${#fields.hasErrors('nama')} ? 'is-invalid'"
                                   placeholder="Contoh: Tiket Konser, Tiket Pesawat..."
                                   required minlength="2" maxlength="100">
                            <div th:if="${#fields.hasErrors('nama')}" class="invalid-feedback" th:errors="*{nama}"></div>
                            <div class="invalid-feedback">Nama tiket wajib diisi (minimal 2 karakter).</div>
                        </div>

                        <div class="mb-4">
                            <label for="tanggal" class="form-label">
                                <i class="bi bi-calendar3 me-1 text-primary"></i>Tanggal
                            </label>
                            <input type="date" class="form-control" id="tanggal"
                                   th:field="*{tanggal}"
                                   th:classappend="${#fields.hasErrors('tanggal')} ? 'is-invalid'"
                                   required>
                            <div th:if="${#fields.hasErrors('tanggal')}" class="invalid-feedback" th:errors="*{tanggal}"></div>
                            <div class="invalid-feedback">Tanggal wajib diisi.</div>
                        </div>

                        <div class="mb-4">
                            <label for="harga" class="form-label">
                                <i class="bi bi-currency-dollar me-1 text-primary"></i>Harga
                            </label>
                            <div class="input-group">
                                <span class="input-group-text">Rp</span>
                                <input type="number" class="form-control" id="harga"
                                       th:field="*{harga}"
                                       th:classappend="${#fields.hasErrors('harga')} ? 'is-invalid'"
                                       placeholder="0"
                                       min="0" step="1000" required>
                                <div th:if="${#fields.hasErrors('harga')}" class="invalid-feedback" th:errors="*{harga}"></div>
                                <div class="invalid-feedback">Harga wajib diisi dan tidak boleh negatif.</div>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-simpan">
                                <i class="bi bi-check-lg me-1"></i>Simpan Tiket
                            </button>
                            <a href="/tiket" class="btn btn-batal">
                                <i class="bi bi-x-lg me-1"></i>Batal
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Client-side validation
    document.getElementById('tiketForm').addEventListener('submit', function(e) {
        if (!this.checkValidity()) {
            e.preventDefault();
            e.stopPropagation();
        }
        this.classList.add('was-validated');
    });
</script>
</body>
</html>
