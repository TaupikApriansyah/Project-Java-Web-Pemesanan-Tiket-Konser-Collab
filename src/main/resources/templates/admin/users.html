<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola User</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body>
<div class="bg-mesh"></div>

<main class="max-w-6xl mx-auto px-8 py-16">
    <a th:href="@{/admin/dashboard}"
       class="text-xs uppercase tracking-widest text-slate-500">
        ← Dashboard
    </a>

    <h1 class="text-5xl font-extrabold tracking-tighter mt-4 mb-10">Kelola User</h1>

    <div class="panel rounded-3xl overflow-hidden">
        <table class="w-full text-sm">
            <thead class="text-slate-500 uppercase tracking-widest text-xs">
                <tr>
                    <th class="p-4 text-left">Nama</th>
                    <th class="p-4 text-left">Email</th>
                    <th class="p-4 text-left">Role</th>
                    <th class="p-4 text-left">Status</th>
                    <th class="p-4 text-left">Aksi</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="u : ${users}" class="border-t border-white/5">
                    <td class="p-4 font-bold" th:text="${u.nama}"></td>
                    <td class="p-4" th:text="${u.email}"></td>
                    <td class="p-4">
                        <form th:action="@{/admin/users/{id}/role(id=${u.id})}"
                              method="post"
                              class="flex gap-2">
                            <select name="role" class="input-premium rounded-xl px-3 py-2">
                                <option value="USER" th:selected="${u.role=='USER'}">USER</option>
                                <option value="ADMIN" th:selected="${u.role=='ADMIN'}">ADMIN</option>
                            </select>
                            <button class="text-emerald-400">Simpan</button>
                        </form>
                    </td>
                    <td class="p-4" th:text="${u.active ? 'Aktif' : 'Nonaktif'}"></td>
                    <td class="p-4">
                        <form th:action="@{/admin/users/{id}/toggle(id=${u.id})}" method="post">
                            <button class="text-red-400"
                                    th:text="${u.active ? 'Ban' : 'Aktifkan'}"></button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>
</body>
</html>
