<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Tiket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body>
<div class="bg-mesh"></div>
<button onclick="goBack('/admin/dashboard')" class="mobile-back">
    <i class="fas fa-arrow-left"></i>
</button>

<main class="max-w-6xl mx-auto px-5 md:px-8 py-12 md:py-16">

    <!-- Header -->
    <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-6 mb-10">
        <div>
            <button onclick="goBack('/admin/dashboard')"
                    class="hidden md:inline text-xs uppercase tracking-widest text-slate-500 hover:text-white">
                ← Dashboard
            </button>
            <h1 class="text-5xl font-extrabold tracking-tighter mt-4">Kelola Event</h1>
            <p class="text-slate-500 mt-2">Tambah, edit, hapus event, dan upload gambar konser.</p>
        </div>
        <a th:href="@{/admin/tiket/add}"
           class="btn-premium px-8 py-4 rounded-2xl font-bold text-xs uppercase tracking-widest text-center">
            Tambah Event
        </a>
    </div>

    <!-- List tiket -->
    <div class="space-y-4">
        <div th:each="t : ${tiketList}"
             class="panel rounded-3xl p-4 flex flex-col md:flex-row md:items-center gap-5">

            <!-- Gambar -->
            <div class="w-full md:w-36 h-32 md:h-24 rounded-2xl overflow-hidden border border-white/5 shrink-0">
                <img th:if="${t.gambar != null and !#strings.isEmpty(t.gambar)}"
                     th:src="${t.gambar}"
                     class="event-image w-full h-full"
                     alt="gambar">
                <div th:if="${t.gambar == null or #strings.isEmpty(t.gambar)}"
                     class="w-full h-full flex items-center justify-center text-slate-600">
                    <i class="fas fa-image text-3xl"></i>
                </div>
            </div>

            <!-- Info -->
            <div class="flex-1">
                <p class="text-[10px] text-slate-600 font-black uppercase tracking-widest">
                    <span th:text="${t.kategori}">Kategori</span> •
                    <span th:text="${t.tanggal}">Tanggal</span>
                </p>
                <h2 class="text-xl font-extrabold mt-1" th:text="${t.nama}">Nama Event</h2>
                <p class="text-sm text-slate-500 mt-1">
                    <i class="fas fa-map-marker-alt mr-2 text-red-500/50"></i>
                    <span th:text="${t.lokasi}">Lokasi</span>
                </p>
            </div>

            <!-- Stok -->
            <div class="md:text-right">
                <p class="text-[10px] text-slate-600 font-black uppercase tracking-widest">Stok</p>
                <p class="text-xl font-black"
                   th:classappend="${t.stok == 0} ? ' text-red-400' : (${t.stok <= 10} ? ' text-amber-400' : '')"
                   th:text="${t.stok}">0</p>
            </div>

            <!-- Aksi -->
            <div class="flex gap-3">
                <a th:href="@{/admin/tiket/edit/{id}(id=${t.id})}"
                   class="px-5 py-3 rounded-xl border border-emerald-500/20 text-emerald-400 text-xs font-bold uppercase tracking-widest">
                    Edit
                </a>
                <a th:href="@{/admin/tiket/delete/{id}(id=${t.id})}"
                   class="px-5 py-3 rounded-xl border border-red-500/20 text-red-400 text-xs font-bold uppercase tracking-widest"
                   onclick="return confirm('Hapus event ini?')">
                    Hapus
                </a>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(tiketList)}"
             class="panel rounded-3xl p-8 text-slate-400">
            Belum ada event.
        </div>
    </div>

</main>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
