<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Tiket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1a56db;
            --bg: #f1f5f9;
            --border: #e2e8f0;
            --text: #1e293b;
            --muted: #64748b;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .navbar-brand { font-weight: 700; font-size: 1.3rem; }
        .page-header { background: linear-gradient(135deg, #1a56db 0%, #1e3a8a 100%); color: white; padding: 2.5rem 0 3.5rem; margin-bottom: -2rem; }
        .page-header h1 { font-weight: 700; font-size: 1.8rem; letter-spacing: -0.5px; }
        .card { border: none; border-radius: 16px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); }
        .table { margin: 0; }
        .table thead th { background: #f8fafc; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); border-bottom: 2px solid var(--border); padding: 1rem 1.25rem; }
        .table tbody td { padding: 1rem 1.25rem; vertical-align: middle; border-color: var(--border); font-size: 0.95rem; }
        .table tbody tr:hover { background: #f8fafc; }
        .ticket-name { font-weight: 600; }
        .badge-date { background: #eff6ff; color: #1d4ed8; border-radius: 8px; padding: 0.3em 0.75em; font-size: 0.85rem; font-weight: 500; }
        .harga-text { font-weight: 700; color: #059669; font-size: 1rem; }
        .btn-edit { background: #eff6ff; color: #1d4ed8; border: none; border-radius: 8px; padding: 0.4rem 0.9rem; font-size: 0.85rem; font-weight: 600; transition: all 0.15s; }
        .btn-edit:hover { background: #dbeafe; color: #1e3a8a; }
        .btn-delete { background: #fff1f2; color: #e11d48; border: none; border-radius: 8px; padding: 0.4rem 0.9rem; font-size: 0.85rem; font-weight: 600; transition: all 0.15s; }
        .btn-delete:hover { background: #ffe4e6; color: #be123c; }
        .btn-tambah { background: #fff; color: var(--primary); border: 2px solid rgba(255,255,255,0.4); border-radius: 10px; padding: 0.6rem 1.25rem; font-weight: 600; font-size: 0.9rem; transition: all 0.2s; }
        .btn-tambah:hover { background: rgba(255,255,255,0.15); color: white; }
        .empty-state { text-align: center; padding: 3rem; color: var(--muted); }
        .empty-state i { font-size: 3rem; opacity: 0.3; display: block; margin-bottom: 1rem; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark" style="background: #1e3a8a;">
    <div class="container">
        <span class="navbar-brand"><i class="bi bi-ticket-perforated-fill me-2"></i>TiketApp</span>
    </div>
</nav>

<div class="page-header">
    <div class="container d-flex justify-content-between align-items-center">
        <div>
            <h1><i class="bi bi-collection me-2"></i>Daftar Tiket</h1>
            <p class="mb-0" style="opacity:0.8;">Kelola semua tiket pemesanan Anda</p>
        </div>
        <a href="/tiket/add" class="btn btn-tambah">
            <i class="bi bi-plus-lg me-1"></i> Tambah Tiket
        </a>
    </div>
</div>

<div class="container mb-5" style="margin-top: 2.5rem;">
    <div class="card">
        <div class="card-body p-0">
            <div th:if="${#lists.isEmpty(tiketList)}" class="empty-state">
                <i class="bi bi-ticket-perforated"></i>
                <h5>Belum ada tiket</h5>
                <p>Klik "Tambah Tiket" untuk mulai menambahkan tiket baru.</p>
            </div>
            <div th:unless="${#lists.isEmpty(tiketList)}">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Nama Tiket</th>
                            <th>Tanggal</th>
                            <th>Harga</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="tiket, iterStat : ${tiketList}">
                            <td class="text-muted" th:text="${iterStat.count}"></td>
                            <td class="ticket-name" th:text="${tiket.nama}"></td>
                            <td>
                                <span class="badge-date">
                                    <i class="bi bi-calendar3 me-1"></i>
                                    <span th:text="${#temporals.format(tiket.tanggal, 'dd MMM yyyy')}"></span>
                                </span>
                            </td>
                            <td class="harga-text">
                                <span th:text="'Rp ' + ${#numbers.formatDecimal(tiket.harga, 1, 'POINT', 0, 'COMMA')}"></span>
                            </td>
                            <td>
                                <a th:href="@{'/tiket/edit/' + ${tiket.id}}" class="btn btn-edit me-1">
                                    <i class="bi bi-pencil-fill me-1"></i>Edit
                                </a>
                                <a th:href="@{'/tiket/delete/' + ${tiket.id}}"
                                   class="btn btn-delete"
                                   onclick="return confirm('Yakin ingin menghapus tiket ini?')">
                                    <i class="bi bi-trash-fill me-1"></i>Hapus
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div th:unless="${#lists.isEmpty(tiketList)}" class="mt-3 px-1">
        <small class="text-muted">Total <strong th:text="${#lists.size(tiketList)}"></strong> tiket terdaftar</small>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
