<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - EventTick</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body>
<button onclick="goBack('/')" class="mobile-back">
    <i class="fas fa-arrow-left"></i>
</button>
<div class="bg-mesh"></div>

<main class="min-h-screen flex items-center justify-center px-6">
    <section class="w-full max-w-md panel rounded-[32px] p-8">

        <a th:href="@{/}" class="flex items-center gap-3 mb-10">
            <div class="w-10 h-10 bg-gradient-to-br from-emerald-400 to-blue-500 rounded-xl flex items-center justify-center">
                <i class="fas fa-ticket-alt"></i>
            </div>
            <span class="text-xl font-bold uppercase">
                Event<span class="text-emerald-400">Tick</span>
            </span>
        </a>

        <p class="text-emerald-400 text-[10px] font-black uppercase tracking-[0.35em] mb-3">Buat Akun</p>
        <h1 class="text-4xl font-extrabold tracking-tighter mb-2">Mulai Pesan Tiket</h1>
        <p class="text-slate-500 mb-8">Akun dipakai untuk checkout dan akses riwayat tiket.</p>

        <div th:if="${error}"
             class="mb-5 rounded-2xl border border-red-500/20 bg-red-500/10 px-4 py-3 text-sm text-red-300"
             th:text="${error}"></div>

        <form th:action="@{/register}" method="post" th:object="${user}" class="space-y-4">
            <input class="w-full input-premium rounded-2xl px-5 py-4"
                   th:field="*{nama}"
                   placeholder="Nama lengkap"
                   required>
            <input class="w-full input-premium rounded-2xl px-5 py-4"
                   th:field="*{email}"
                   type="email"
                   placeholder="Email"
                   required>
            <input class="w-full input-premium rounded-2xl px-5 py-4"
                   th:field="*{password}"
                   type="password"
                   placeholder="Password"
                   required>
            <button class="w-full btn-premium rounded-2xl py-4 font-bold uppercase tracking-[0.2em] text-xs">
                Daftar
            </button>
        </form>

        <p class="mt-8 text-sm text-slate-500">
            Sudah punya akun?
            <a th:href="@{/login}" class="text-emerald-400 font-bold">Login</a>
        </p>
    </section>
</main>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
