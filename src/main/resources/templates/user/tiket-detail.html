<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Event</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body><div class="bg-mesh"></div><button onclick="goBack('/')" class="mobile-back"><i class="fas fa-arrow-left"></i></button>
<nav class="glass-nav sticky top-0 z-50"><div class="max-w-6xl mx-auto px-5 md:px-8 h-20 flex justify-between items-center"><a th:href="@{/}" class="font-bold uppercase">Event<span class="text-emerald-400">Tick</span></a><button onclick="goBack('/')" class="hidden md:inline text-xs uppercase tracking-widest text-slate-400 hover:text-white">← Kembali</button></div></nav>
<main class="max-w-5xl mx-auto px-5 md:px-8 py-12 md:py-20"><div class="rounded-[36px] overflow-hidden border border-white/5 mb-10 h-64 md:h-[420px]"><img th:if="${tiket.gambar != null and !#strings.isEmpty(tiket.gambar)}" th:src="${tiket.gambar}" class="event-image w-full h-full" alt="Gambar event"><div th:if="${tiket.gambar == null or #strings.isEmpty(tiket.gambar)}" class="w-full h-full flex items-center justify-center text-slate-600 bg-white/[0.03]"><i class="fas fa-music text-6xl"></i></div></div><p class="text-emerald-400 text-[11px] font-black uppercase tracking-[0.4em] mb-4" th:text="${tiket.kategori}">Kategori</p><h1 class="text-5xl md:text-7xl font-extrabold tracking-tighter leading-none mb-8" th:text="${tiket.nama}">Nama Event</h1><div class="grid md:grid-cols-[1fr_320px] gap-10"><section><div class="schedule-container"><div class="schedule-line"></div><div class="schedule-row py-6"><div class="schedule-dot"></div><p class="text-xs text-slate-600 uppercase tracking-widest font-black">Tanggal Event</p><p class="text-2xl font-bold" th:text="${#temporals.format(tiket.tanggal,'dd MMMM yyyy')}">15 September 2024</p></div><div class="schedule-row py-6"><div class="schedule-dot"></div><p class="text-xs text-slate-600 uppercase tracking-widest font-black">Lokasi</p><p class="text-2xl font-bold" th:text="${tiket.lokasi}">Lokasi</p></div><div class="schedule-row py-6"><div class="schedule-dot"></div><p class="text-xs text-slate-600 uppercase tracking-widest font-black">Deskripsi</p><p class="text-slate-400 leading-relaxed mt-2" th:text="${tiket.deskripsi}">Deskripsi event</p></div></div></section><aside class="panel rounded-[32px] p-8 h-fit"><p class="text-[10px] text-slate-600 font-black uppercase tracking-widest">Harga Tiket</p><p class="text-3xl font-black mt-1">Rp <span th:text="${#numbers.formatDecimal(tiket.harga,0,'POINT',0,'COMMA')}">0</span></p><p class="text-slate-500 text-sm mt-2">Sisa stok: <b th:text="${tiket.stok}">0</b> tiket</p><a th:if="${tiket.stok > 0}" th:href="@{/booking/confirm/{id}(id=${tiket.id})}" class="block text-center mt-8 btn-premium rounded-2xl py-4 font-bold uppercase tracking-[0.2em] text-xs">Booking Sekarang</a><button th:if="${tiket.stok <= 0}" disabled class="w-full mt-8 bg-slate-800 text-slate-500 rounded-2xl py-4 font-bold uppercase tracking-[0.2em] text-xs">Stok Habis</button></aside></div></main><script th:src="@{/js/app.js}"></script></body></html>
