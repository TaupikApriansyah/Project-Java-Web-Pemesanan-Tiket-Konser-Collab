<!DOCTYPE html><html lang="id" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Cetak Tiket</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" th:href="@{/css/custom.css}"><style>@media print{body{background:white;color:black}.no-print{display:none}.panel{border:1px solid #ddd;background:white;color:black}}</style></head><body><div class="bg-mesh no-print"></div><main class="max-w-3xl mx-auto px-8 py-20"><a th:href="@{/riwayat}" class="no-print text-xs uppercase tracking-widest text-slate-500">← Riwayat</a><section class="panel rounded-[32px] p-10 mt-8"><p class="text-emerald-400 text-[10px] font-black uppercase tracking-[0.35em] mb-3">Tiket Digital</p><h1 class="text-4xl font-extrabold tracking-tighter" th:text="${booking.tiket.nama}">Nama Event</h1><div class="grid md:grid-cols-2 gap-6 mt-8 text-sm"><div><p class="text-slate-500">Kode Booking</p><p class="text-2xl font-black text-emerald-400" th:text="${booking.kodeBooking}">BK</p></div><div><p class="text-slate-500">Nama Pembeli</p><p class="font-bold" th:text="${booking.user.nama}">Nama</p></div><div><p class="text-slate-500">Tanggal</p><p class="font-bold" th:text="${#temporals.format(booking.tiket.tanggal,'dd MMMM yyyy')}">Tanggal</p></div><div><p class="text-slate-500">Lokasi</p><p class="font-bold" th:text="${booking.tiket.lokasi}">Lokasi</p></div><div><p class="text-slate-500">Jumlah</p><p class="font-bold"><span th:text="${booking.jumlah}"></span> tiket</p></div><div><p class="text-slate-500">Status</p><p class="font-bold" th:text="${booking.status}">PAID</p></div></div><button onclick="window.print()" class="no-print mt-10 btn-premium px-8 py-4 rounded-2xl font-bold text-xs uppercase tracking-[0.2em]">Print / Download PDF</button></section></main></body></html>
