<!DOCTYPE html><html lang="id" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Booking Berhasil</title><script src="https://cdn.tailwindcss.com"></script><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/custom.css}"></head><body><button onclick="goBack('/')" class="mobile-back"><i class="fas fa-arrow-left"></i></button><div class="bg-mesh"></div><main class="min-h-screen flex items-center justify-center px-6"><section class="w-full max-w-2xl panel rounded-[40px] p-10 text-center"><div class="w-16 h-16 bg-gradient-to-br from-emerald-400 to-blue-500 rounded-2xl flex items-center justify-center text-white text-2xl mx-auto mb-8"><i class="fas fa-check"></i></div><p class="text-emerald-400 text-[10px] font-black uppercase tracking-[0.35em] mb-3">Booking Berhasil</p><h1 class="text-4xl font-extrabold tracking-tighter mb-3" th:text="${booking.tiket.nama}">Nama Event</h1><p class="text-slate-500 mb-8">Simpan kode booking ini untuk validasi di admin.</p><div class="rounded-3xl bg-black/20 border border-white/5 p-6"><p class="text-[10px] text-slate-600 font-black uppercase tracking-widest">Kode Booking</p><p class="text-3xl font-black text-emerald-400 tracking-widest mt-2" th:text="${booking.kodeBooking}">BK-XXXX</p></div><div class="mt-8 flex flex-col md:flex-row gap-4 justify-center"><a th:href="@{/booking/print/{id}(id=${booking.id})}" class="btn-premium px-8 py-4 rounded-2xl font-bold text-xs uppercase tracking-[0.2em]">Cetak Tiket</a><a th:href="@{/riwayat}" class="px-8 py-4 rounded-2xl border border-white/10 text-slate-300 font-bold text-xs uppercase tracking-[0.2em]">Lihat Riwayat</a></div></section></main><script th:src="@{/js/app.js}"></script></body></html>
