<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<nav class="glass-nav sticky top-0 z-50"><div class="max-w-7xl mx-auto px-6 md:px-12"><div class="flex justify-between h-20 items-center"><a th:href="@{/}" class="flex items-center gap-4"><div class="w-10 h-10 bg-gradient-to-br from-emerald-400 to-blue-500 rounded-xl flex items-center justify-center text-white shadow-xl shadow-emerald-500/10"><i class="fas fa-ticket-alt"></i></div><span class="text-xl font-bold tracking-tight uppercase">Event<span class="text-emerald-400">Tick</span></span></a><div class="hidden lg:flex items-center space-x-10 text-[11px] font-bold uppercase tracking-[0.2em]"><a th:href="@{/}" class="text-slate-400 hover:text-white transition">Jadwal Tur</a><a sec:authorize="isAuthenticated()" th:href="@{/riwayat}" class="text-slate-400 hover:text-white transition">Riwayat Tiket</a><a sec:authorize="isAuthenticated()" th:href="@{/profile}" class="text-emerald-400 border-b-2 border-emerald-400 pb-1">Profil</a><a sec:authorize="hasRole('ADMIN')" th:href="@{/admin/dashboard}" class="text-slate-400 hover:text-white transition">Admin</a></div><div class="flex items-center gap-4"><a sec:authorize="isAnonymous()" th:href="@{/login}" class="hidden sm:block text-slate-400 hover:text-white font-bold text-[11px] uppercase tracking-widest transition">Masuk</a><a sec:authorize="isAnonymous()" th:href="@{/register}" class="px-5 md:px-6 py-2.5 bg-white text-black font-black text-[11px] uppercase tracking-widest rounded-full hover:bg-emerald-400 hover:text-white transition-all">Daftar</a><form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post"><button class="px-5 py-2.5 bg-white/5 border border-white/10 text-slate-300 font-black text-[11px] uppercase tracking-widest rounded-full hover:border-red-500 hover:text-red-400 transition">Logout</button></form></div></div></div></nav>
<body>
<div class="bg-mesh"></div>

<main class="max-w-xl mx-auto px-8 py-20">
    <a th:href="@{/riwayat}" class="text-xs uppercase tracking-widest text-slate-500">
        ← Riwayat
    </a>

    <section class="panel rounded-[32px] p-8 mt-8">
        <h1 class="text-4xl font-extrabold tracking-tighter mb-2">Profil Akun</h1>
        <p class="text-slate-500 mb-8">Update nama dan password. Kosongkan password jika tidak ingin mengganti.</p>

        <form th:action="@{/profile}" method="post" class="space-y-4">
            <input name="nama"
                   th:value="${user.nama}"
                   class="w-full input-premium rounded-2xl px-5 py-4"
                   required>
            <input th:value="${user.email}"
                   class="w-full input-premium rounded-2xl px-5 py-4 text-slate-500"
                   disabled>
            <input name="newPassword"
                   type="password"
                   class="w-full input-premium rounded-2xl px-5 py-4"
                   placeholder="Password baru opsional">
            <button class="w-full btn-premium rounded-2xl py-4 font-bold uppercase tracking-[0.2em] text-xs">
                Simpan Profil
            </button>
        </form>
    </section>
</main>
</body>
</html>
