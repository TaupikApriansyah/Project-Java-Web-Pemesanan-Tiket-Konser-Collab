<!DOCTYPE html><html lang="id" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Checkout</title><script src="https://cdn.tailwindcss.com"></script><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/custom.css}"></head><body><div class="bg-mesh"></div><button onclick="goBack('/')" class="mobile-back"><i class="fas fa-arrow-left"></i></button><main class="max-w-4xl mx-auto px-5 md:px-8 py-12 md:py-20"><button onclick="goBack('/')" class="hidden md:inline text-xs uppercase tracking-widest text-slate-500 hover:text-white">← Kembali</button><h1 class="text-5xl font-extrabold tracking-tighter mt-8 mb-4">Checkout Tiket</h1><p class="text-slate-500 mb-10">Alur: pilih jumlah → pilih metode bayar simulasi → konfirmasi → tiket digital tersimpan di riwayat.</p><div class="grid md:grid-cols-[1fr_340px] gap-8"><section class="panel rounded-[32px] p-6 md:p-8"><div class="rounded-3xl overflow-hidden border border-white/5 mb-6 h-56"><img th:if="${tiket.gambar != null and !#strings.isEmpty(tiket.gambar)}" th:src="${tiket.gambar}" class="event-image w-full h-full" alt="gambar"><div th:if="${tiket.gambar == null or #strings.isEmpty(tiket.gambar)}" class="w-full h-full flex items-center justify-center text-slate-600"><i class="fas fa-music text-5xl"></i></div></div><p class="text-emerald-400 text-[10px] font-black uppercase tracking-[0.3em] mb-3" th:text="${tiket.kategori}">Kategori</p><h2 class="text-3xl font-bold" th:text="${tiket.nama}">Nama Event</h2><p class="text-slate-500 mt-2"><i class="fas fa-map-marker-alt mr-2 text-red-500/50"></i><span th:text="${tiket.lokasi}"></span></p><p class="text-slate-500 mt-1"><i class="far fa-calendar mr-2 text-emerald-500/50"></i><span th:text="${#temporals.format(tiket.tanggal,'dd MMMM yyyy')}"></span></p><div th:if="${error}" class="mt-6 rounded-2xl border border-red-500/20 bg-red-500/10 px-4 py-3 text-sm text-red-300" th:text="${error}"></div></section><form th:action="@{/booking/create/{id}(id=${tiket.id})}" method="post" class="panel rounded-[32px] p-6 md:p-8"><p class="text-[10px] text-slate-600 font-black uppercase tracking-widest">Harga per tiket</p><p class="text-3xl font-black">Rp <span id="harga" th:data-harga="${tiket.harga}" th:text="${#numbers.formatDecimal(tiket.harga,0,'POINT',0,'COMMA')}">0</span></p><label class="block mt-6 text-xs text-slate-500 uppercase tracking-widest font-bold">Jumlah Tiket</label><input id="jumlah" name="jumlah" type="number" min="1" th:max="${tiket.stok}" value="1" class="mt-2 w-full input-premium rounded-2xl px-5 py-4" required><label class="block mt-6 text-xs text-slate-500 uppercase tracking-widest font-bold">Pembayaran</label><select name="metodePembayaran" class="mt-2 w-full input-premium rounded-2xl px-5 py-4"><option>Virtual Transfer</option><option>E-Wallet</option><option>Simulasi Pembayaran</option></select><div class="mt-8 border-t border-white/5 pt-6 flex justify-between"><span class="text-slate-500 font-bold">Total</span><span class="text-xl font-black" id="totalLabel">Rp 0</span></div><button class="w-full mt-8 btn-premium rounded-2xl py-4 font-bold uppercase tracking-[0.2em] text-xs">Konfirmasi Booking</button></form></div></main><script th:src="@{/js/app.js}"></script><script>const h=document.getElementById('harga'),j=document.getElementById('jumlah'),t=document.getElementById('totalLabel');function hitung(){const total=(parseFloat(h.dataset.harga)||0)*(parseInt(j.value)||1);t.textContent='Rp '+new Intl.NumberFormat('id-ID').format(total)}j.addEventListener('input',hitung);hitung();</script></body></html>
