<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>
<body>
<button onclick="goBack('/')" class="mobile-back">
    <i class="fas fa-arrow-left"></i>
</button>
<div class="bg-mesh"></div>

<nav class="glass-nav sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-8 h-20 flex justify-between items-center">
        <a th:href="@{/}" class="font-bold uppercase">
            Event<span class="text-emerald-400">Tick</span>
        </a>
        <a th:href="@{/profile}" class="text-xs uppercase tracking-widest text-slate-400 hover:text-white">
            Profil
        </a>
    </div>
</nav>

<main class="max-w-5xl mx-auto px-8 py-20">
    <h1 class="text-5xl font-extrabold tracking-tighter mb-4">Riwayat Tiket</h1>
    <p class="text-slate-500 mb-10">Semua tiket yang pernah kamu booking tersimpan di sini.</p>

    <!-- Flash messages -->
    <div th:if="${successMessage}"
         class="mb-8 rounded-2xl border border-emerald-500/20 bg-emerald-500/10 px-5 py-4 text-emerald-300 font-bold text-sm">
        <i class="fas fa-check-circle mr-2"></i>
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}"
         class="mb-8 rounded-2xl border border-red-500/20 bg-red-500/10 px-5 py-4 text-red-300 font-bold text-sm">
        <i class="fas fa-exclamation-circle mr-2"></i>
        <span th:text="${errorMessage}"></span>
    </div>

    <div class="schedule-container">
        <div class="schedule-line"></div>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(bookingList)}" class="schedule-row py-8">
            <div class="schedule-dot"></div>
            <p class="text-slate-400">Belum ada booking.</p>
        </div>

        <!-- Booking rows -->
        <div th:each="b : ${bookingList}"
             class="schedule-row py-8 flex flex-col md:flex-row md:items-center gap-8">

            <div class="schedule-dot"></div>

            <div class="md:w-40">
                <p class="text-[10px] text-slate-600 font-black uppercase tracking-widest">Kode</p>
                <p class="text-xl font-black text-emerald-400" th:text="${b.kodeBooking}">BK</p>
            </div>

            <div class="flex-1">
                <span class="btn-status"
                      th:classappend="${b.status == 'PAID'} ? ' status-selling' :
                                      (${b.status == 'VALIDATED'} ? ' status-upcoming' :
                                      (${b.status == 'REFUNDED'} ? ' status-sold-out' : ' status-sold-out'))"
                      th:text="${b.status}">PAID</span>

                <h3 class="text-2xl font-extrabold mt-2" th:text="${b.tiket.nama}">Event</h3>

                <p class="text-slate-500 text-sm mt-1">
                    <span th:text="${b.jumlah}">1</span> tiket •
                    Rp <span th:text="${#numbers.formatDecimal(b.totalHarga,0,'POINT',0,'COMMA')}">0</span>
                </p>
                <p class="text-slate-600 text-xs mt-1">
                    <i class="far fa-calendar mr-1"></i>
                    <span th:text="${#temporals.format(b.bookedAt,'dd MMM yyyy, HH:mm')}"></span>
                </p>
            </div>

            <!-- Aksi -->
            <div class="flex flex-row md:flex-col gap-3">
                <!-- Cetak (tidak untuk REFUNDED) -->
                <a th:if="${b.status != 'REFUNDED'}"
                   th:href="@{/booking/print/{id}(id=${b.id})}"
                   class="px-6 py-3 rounded-xl border border-white/10 font-bold text-xs uppercase tracking-widest text-slate-300 hover:border-emerald-400 transition text-center">
                    <i class="fas fa-print mr-1"></i> Cetak
                </a>

                <!-- Refund (hanya untuk PAID) -->
                <form th:if="${b.status == 'PAID'}"
                      th:action="@{/booking/refund/{id}(id=${b.id})}"
                      method="post"
                      onsubmit="return confirm('Yakin ingin refund tiket ini? Tindakan tidak bisa dibatalkan.')">
                    <button type="submit"
                            class="w-full px-6 py-3 rounded-xl border border-red-500/20 text-red-400 font-bold text-xs uppercase tracking-widest hover:bg-red-500/10 transition">
                        <i class="fas fa-undo mr-1"></i> Refund
                    </button>
                </form>

                <!-- Badge REFUNDED -->
                <span th:if="${b.status == 'REFUNDED'}"
                      class="px-6 py-3 rounded-xl bg-white/[0.02] text-slate-600 font-bold text-xs uppercase tracking-widest text-center">
                    <i class="fas fa-ban mr-1"></i> Direfund
                </span>
            </div>

        </div>
    </div>
</main>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
