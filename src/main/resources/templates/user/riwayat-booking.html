<!DOCTYPE html><html lang="id" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Riwayat Booking</title><script src="https://cdn.tailwindcss.com"></script><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"><link rel="stylesheet" th:href="@{/css/custom.css}"></head><body><button onclick="goBack('/')" class="mobile-back"><i class="fas fa-arrow-left"></i></button><div class="bg-mesh"></div><nav class="glass-nav sticky top-0 z-50"><div class="max-w-6xl mx-auto px-8 h-20 flex justify-between items-center"><a th:href="@{/}" class="font-bold uppercase">Event<span class="text-emerald-400">Tick</span></a><a th:href="@{/profile}" class="text-xs uppercase tracking-widest text-slate-400 hover:text-white">Profil</a></div></nav><main class="max-w-5xl mx-auto px-8 py-20"><h1 class="text-5xl font-extrabold tracking-tighter mb-4">Riwayat Tiket</h1><p class="text-slate-500 mb-10">Semua tiket yang pernah kamu booking tersimpan di sini.</p><div class="schedule-container"><div class="schedule-line"></div><div th:if="${#lists.isEmpty(bookingList)}" class="schedule-row py-8"><div class="schedule-dot"></div><p class="text-slate-400">Belum ada booking.</p></div><div th:each="b : ${bookingList}" class="schedule-row py-8 flex flex-col md:flex-row md:items-center gap-8"><div class="schedule-dot"></div><div class="md:w-40"><p class="text-[10px] text-slate-600 font-black uppercase tracking-widest">Kode</p><p class="text-xl font-black text-emerald-400" th:text="${b.kodeBooking}">BK</p></div><div class="flex-1"><span class="btn-status status-selling" th:text="${b.status}">PAID</span><h3 class="text-2xl font-extrabold mt-2" th:text="${b.tiket.nama}">Event</h3><p class="text-slate-500 text-sm mt-1"><span th:text="${b.jumlah}">1</span> tiket • Rp <span th:text="${#numbers.formatDecimal(b.totalHarga,0,'POINT',0,'COMMA')}">0</span></p></div><a th:href="@{/booking/print/{id}(id=${b.id})}" class="px-8 py-3 rounded-xl border border-white/10 font-bold text-xs uppercase tracking-widest text-slate-300 hover:border-emerald-400">Cetak</a></div></div></main><script th:src="@{/js/app.js}"></script></body></html>
